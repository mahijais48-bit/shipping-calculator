<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<p>YouTube Subscribe Button</p>
<button onclick='subscribe();' class="js-sub-btn">Subscribe</button>

<br>
<p>Amazon Shipping Calculator</p>

<p>Order under $40=+$10 Shipping.</p>
<p>Order over $40 = Free Shipping.</p>

<input type="number" placeholder="Cost of order" class="js-cost-input" onkeydown="cost1(event);">

<button onclick="calculateShipping();" class="js-total-cost">Calculate Shipping</button>
<p class="js-result"></p>
<script>
    function subscribe(){
        if (document.querySelector('.js-sub-btn').innerHTML === 'Subscribe'){
            document.querySelector('.js-sub-btn').innerHTML = 'Subscribed';
        }else{
            document.querySelector('.js-sub-btn').innerHTML='Subscribe';
        }}

        function cost1(event){
            if (event.key === 'Enter'){
                calculateShipping();
            }
        }
        function calculateShipping(){
            const input=document.querySelector('.js-cost-input');
            let cost=Number(input.value);
            
            if (cost < 40){
                cost=cost+10;

            }
          document.querySelector('.js-result').
          innerHTML = `$${cost}`;
        }
    
</script>

</body>
</html>
